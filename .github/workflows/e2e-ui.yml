name: E2E UI Tests

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-ui:
    name: UI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Checkout app
        uses: actions/checkout@v6
        with:
          repository: danielcawen/app-for-e2e
          path: app

      - name: Fetch secrets (CI config)
        uses: dopplerhq/secrets-fetch-action@v2.0.0
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN_CI }}
          inject-env-vars: true

      - name: Start app
        working-directory: app
        run: |
          export AI_PROVIDER=$([ -n "$OPENAI_API_KEY" ] && echo "openai" || echo "mock")
          export AI_MODEL="${AI_MODEL:-gpt-4o-mini}"
          docker compose up --build -d

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do curl -sf http://localhost:3001/health && break; sleep 3; done
          for i in $(seq 1 30); do curl -sf http://localhost:5173 && break; sleep 3; done

      - name: Run UI tests
        run: npx cucumber-js --profile ui

      - name: Ensure reports directory
        if: always()
        run: mkdir -p reports

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports
          path: reports/
