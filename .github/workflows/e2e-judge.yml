name: E2E Judge Tests

on:
  workflow_dispatch:

jobs:
  test-judge:
    name: Judge Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Checkout app
        uses: actions/checkout@v4
        with:
          repository: danielcawen/app-for-e2e
          path: app

      - name: Fetch secrets (CI config)
        uses: dopplerhq/secrets-fetch-action@v1.1.3
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN_CI }}
          inject-env-vars: true

      - name: Start app
        working-directory: app
        run: |
          export AI_PROVIDER=$([ -n "$OPENAI_API_KEY" ] && echo "openai" || echo "mock")
          export AI_MODEL="${AI_MODEL:-gpt-4o-mini}"
          docker compose up --build -d

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do curl -sf http://localhost:3001/health && break; sleep 3; done
          for i in $(seq 1 30); do curl -sf http://localhost:5173 && break; sleep 3; done

      - name: Run Judge tests
        run: npx cucumber-js --profile judge
