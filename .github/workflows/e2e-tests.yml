name: E2E Tests

on:
  workflow_dispatch:

env:
  LLM_API_KEY: ${{ secrets.LLM_API_KEY }}

jobs:
  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Checkout app
        uses: actions/checkout@v4
        with:
          repository: danielcawen/app-for-e2e
          path: app

      - name: Start app
        working-directory: app
        env:
          AI_PROVIDER: ${{ secrets.OPENAI_API_KEY != '' && 'openai' || 'mock' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_MODEL: ${{ vars.AI_MODEL || 'gpt-4o-mini' }}
        run: docker compose up --build -d

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do curl -sf http://localhost:3001/health && break; sleep 3; done
          for i in $(seq 1 30); do curl -sf http://localhost:5173 && break; sleep 3; done

      - name: Fetch secrets (CI config)
        uses: dopplerhq/secrets-fetch-action@v1.1.3
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN_CI }}
          inject-env-vars: true

      - name: Run API tests
        run: npx cucumber-js --profile api

  test-db:
    name: DB Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Checkout app
        uses: actions/checkout@v4
        with:
          repository: danielcawen/app-for-e2e
          path: app

      - name: Start app
        working-directory: app
        env:
          AI_PROVIDER: ${{ secrets.OPENAI_API_KEY != '' && 'openai' || 'mock' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_MODEL: ${{ vars.AI_MODEL || 'gpt-4o-mini' }}
        run: docker compose up --build -d

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do curl -sf http://localhost:3001/health && break; sleep 3; done
          for i in $(seq 1 30); do curl -sf http://localhost:5173 && break; sleep 3; done

      - name: Fetch secrets (CI config)
        uses: dopplerhq/secrets-fetch-action@v1.1.3
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN_CI }}
          inject-env-vars: true

      - name: Run DB tests
        run: npx cucumber-js --profile db

  test-ui:
    name: UI Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Checkout app
        uses: actions/checkout@v4
        with:
          repository: danielcawen/app-for-e2e
          path: app

      - name: Start app
        working-directory: app
        env:
          AI_PROVIDER: ${{ secrets.OPENAI_API_KEY != '' && 'openai' || 'mock' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_MODEL: ${{ vars.AI_MODEL || 'gpt-4o-mini' }}
        run: docker compose up --build -d

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do curl -sf http://localhost:3001/health && break; sleep 3; done
          for i in $(seq 1 30); do curl -sf http://localhost:5173 && break; sleep 3; done

      - name: Fetch secrets (CI config)
        uses: dopplerhq/secrets-fetch-action@v1.1.3
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN_CI }}
          inject-env-vars: true

      - name: Run UI tests
        run: npx cucumber-js --profile ui

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports
          path: reports/

  test-judge:
    name: Judge Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Checkout app
        uses: actions/checkout@v4
        with:
          repository: danielcawen/app-for-e2e
          path: app

      - name: Start app
        working-directory: app
        env:
          AI_PROVIDER: ${{ secrets.OPENAI_API_KEY != '' && 'openai' || 'mock' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_MODEL: ${{ vars.AI_MODEL || 'gpt-4o-mini' }}
        run: docker compose up --build -d

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do curl -sf http://localhost:3001/health && break; sleep 3; done
          for i in $(seq 1 30); do curl -sf http://localhost:5173 && break; sleep 3; done

      - name: Fetch secrets (CI config)
        uses: dopplerhq/secrets-fetch-action@v1.1.3
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN_CI }}
          inject-env-vars: true

      - name: Run Judge tests
        run: npx cucumber-js --profile judge
