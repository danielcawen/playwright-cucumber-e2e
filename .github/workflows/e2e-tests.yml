name: E2E All Tests

on:
  workflow_dispatch:

jobs:
  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Checkout app
        uses: actions/checkout@v6
        with:
          repository: danielcawen/app-for-e2e
          path: app

      - name: Fetch secrets (CI config)
        uses: dopplerhq/secrets-fetch-action@v2.0.0
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN_CI }}
          inject-env-vars: true

      - name: Start app
        working-directory: app
        run: |
          export AI_PROVIDER=$([ -n "$OPENAI_API_KEY" ] && echo "openai" || echo "mock")
          export AI_MODEL="${AI_MODEL:-gpt-4o-mini}"
          docker compose up --build -d

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do curl -sf http://localhost:3001/health && break; sleep 3; done
          for i in $(seq 1 30); do curl -sf http://localhost:5173 && break; sleep 3; done

      - name: Run API tests
        run: npx cucumber-js --profile api

      - name: Rerun failed API scenarios
        if: always()
        run: |
          if [ -f @rerun.txt ] && [ -s @rerun.txt ]; then
            npx cucumber-js @rerun.txt --profile rerun
            mv reports/rerun-results.json reports/api-rerun-results.json
          fi
          if [ ! -f reports/api-rerun-results.json ]; then
            echo '[]' > reports/api-rerun-results.json
          fi

      - name: Upload API results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-results
          path: reports/api-results.json

      - name: Upload API rerun results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-rerun-results
          path: reports/api-rerun-results.json

  test-db:
    name: DB Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Checkout app
        uses: actions/checkout@v6
        with:
          repository: danielcawen/app-for-e2e
          path: app

      - name: Fetch secrets (CI config)
        uses: dopplerhq/secrets-fetch-action@v2.0.0
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN_CI }}
          inject-env-vars: true

      - name: Start app
        working-directory: app
        run: |
          export AI_PROVIDER=$([ -n "$OPENAI_API_KEY" ] && echo "openai" || echo "mock")
          export AI_MODEL="${AI_MODEL:-gpt-4o-mini}"
          docker compose up --build -d

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do curl -sf http://localhost:3001/health && break; sleep 3; done
          for i in $(seq 1 30); do curl -sf http://localhost:5173 && break; sleep 3; done

      - name: Run DB tests
        run: npx cucumber-js --profile db

      - name: Rerun failed DB scenarios
        if: always()
        run: |
          if [ -f @rerun.txt ] && [ -s @rerun.txt ]; then
            npx cucumber-js @rerun.txt --profile rerun
            mv reports/rerun-results.json reports/db-rerun-results.json
          fi
          if [ ! -f reports/db-rerun-results.json ]; then
            echo '[]' > reports/db-rerun-results.json
          fi

      - name: Upload DB results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: db-results
          path: reports/db-results.json

      - name: Upload DB rerun results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: db-rerun-results
          path: reports/db-rerun-results.json

  test-ui:
    name: UI Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Checkout app
        uses: actions/checkout@v6
        with:
          repository: danielcawen/app-for-e2e
          path: app

      - name: Fetch secrets (CI config)
        uses: dopplerhq/secrets-fetch-action@v2.0.0
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN_CI }}
          inject-env-vars: true

      - name: Start app
        working-directory: app
        run: |
          export AI_PROVIDER=$([ -n "$OPENAI_API_KEY" ] && echo "openai" || echo "mock")
          export AI_MODEL="${AI_MODEL:-gpt-4o-mini}"
          docker compose up --build -d

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do curl -sf http://localhost:3001/health && break; sleep 3; done
