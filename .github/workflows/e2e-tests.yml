        with:
          name: ui-results
          path: reports/ui-results.json

      - name: Upload UI rerun results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-rerun-results
          path: reports/ui-rerun-results.json

  test-judge:
    name: Judge Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Checkout app
        uses: actions/checkout@v6
        with:
          repository: danielcawen/app-for-e2e
          path: app

      - name: Fetch secrets (CI config)
        uses: dopplerhq/secrets-fetch-action@v2.0.0
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN_CI }}
          inject-env-vars: true

      - name: Start app
        working-directory: app
        run: |
          export AI_PROVIDER=$([ -n "$OPENAI_API_KEY" ] && echo "openai" || echo "mock")
          export AI_MODEL="${AI_MODEL:-gpt-4o-mini}"
          docker compose up --build -d

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do curl -sf http://localhost:3001/health && break; sleep 3; done
          for i in $(seq 1 30); do curl -sf http://localhost:5173 && break; sleep 3; done

      - name: Run Judge tests
        run: npx cucumber-js --profile judge

      - name: Rerun failed Judge scenarios
        if: always()
        run: |
          if [ -f @rerun.txt ] && [ -s @rerun.txt ]; then
            npx cucumber-js @rerun.txt --profile rerun
            mv reports/rerun-results.json reports/judge-rerun-results.json
          fi
          if [ ! -f reports/judge-rerun-results.json ]; then
            echo '[]' > reports/judge-rerun-results.json
          fi

      - name: Upload Judge results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: judge-results
          path: reports/judge-results.json

      - name: Upload Judge rerun results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: judge-rerun-results
          path: reports/judge-rerun-results.json

  dashboard:
    name: Generate and Deploy Dashboard
    needs: [test-api, test-db, test-ui, test-judge]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: api-results
          path: _reports/
      - uses: actions/download-artifact@v4
        with:
          name: db-results
          path: _reports/
      - uses: actions/download-artifact@v4
        with:
          name: ui-results
          path: _reports/
      - uses: actions/download-artifact@v4
        with:
          name: judge-results
          path: _reports/

      - uses: actions/download-artifact@v4
        with:
          name: api-rerun-results
          path: _reports/
      - uses: actions/download-artifact@v4
        with:
          name: db-rerun-results
          path: _reports/
      - uses: actions/download-artifact@v4
        with:
          name: ui-rerun-results
          path: _reports/
      - uses: actions/download-artifact@v4
        with:
          name: judge-rerun-results
          path: _reports/

      - uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: _history-checkout
        continue-on-error: true

      - name: Prepare history file
        run: |
          mkdir -p _site
          if [ -f _history-checkout/_history/runs.jsonl ]; then
            cp _history-checkout/_history/runs.jsonl _site/runs.jsonl
          fi

      - name: Generate dashboard
        run: |
          node dashboard/generate.js \
            --api _reports/api-results.json \
            --api-rerun _reports/api-rerun-results.json \
            --db _reports/db-results.json \
            --db-rerun _reports/db-rerun-results.json \
            --ui _reports/ui-results.json \
            --ui-rerun _reports/ui-rerun-results.json \
            --judge _reports/judge-results.json \
            --judge-rerun _reports/judge-rerun-results.json \
            --history _site/runs.jsonl \
            --out _site/index.html \
            --run-id ${{ github.run_id }} \
            --run-number ${{ github.run_number }} \
            --branch ${{ github.ref_name }} \
            --commit ${{ github.sha }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
